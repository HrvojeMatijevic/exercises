<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>Rectangle Handles Tester</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v7.5.2/ol.css">
<script src="https://cdn.jsdelivr.net/npm/ol@v7.5.2/dist/ol.js"></script>

<style>
html, body { margin:0; height:100%; }
#map { width:100%; height:100%; }

button {
  position:absolute;
  top:10px;
  left:10px;
  z-index:1000;
  padding:8px 12px;
}
</style>
</head>

<body>

<button id="drawBtn">Draw rectangle</button>
<div id="map"></div>

<script>

// --- map ---
const raster = new ol.layer.Tile({
  source: new ol.source.OSM()
});

const source = new ol.source.Vector();
const layer = new ol.layer.Vector({ source });

const map = new ol.Map({
  target: 'map',
  layers: [raster, layer],
  view: new ol.View({
    center: ol.proj.fromLonLat([16, 45.8]),
    zoom: 15
  })
});

// --- state ---
let mode = "VIEW";
let rect = null;
let center = null;
let angle = 0;
let halfL = 50;
let halfW = 30;

let activeHandle = null;

// --- helpers ---
function buildRect() {
  const ux = Math.cos(angle);
  const uy = Math.sin(angle);
  const vx = -uy;
  const vy = ux;

  const cx = center[0];
  const cy = center[1];

  return new ol.geom.Polygon([[
    [cx + ux*halfL + vx*halfW, cy + uy*halfL + vy*halfW],
    [cx + ux*halfL - vx*halfW, cy + uy*halfL - vy*halfW],
    [cx - ux*halfL - vx*halfW, cy - uy*halfL - vy*halfW],
    [cx - ux*halfL + vx*halfW, cy - uy*halfL + vy*halfW],
    [cx + ux*halfL + vx*halfW, cy + uy*halfL + vy*halfW]
  ]]);
}

function updateRect() {
  if (!rect) {
    rect = new ol.Feature();
    source.addFeature(rect);
  }
  rect.setGeometry(buildRect());
}

// --- handles ---
let handles = [];

function createHandles() {
  handles.forEach(h => source.removeFeature(h));
  handles = [];

  const cx = center[0];
  const cy = center[1];

  const ux = Math.cos(angle);
  const uy = Math.sin(angle);
  const vx = -uy;
  const vy = ux;

  // center handle
  const centerH = new ol.Feature(new ol.geom.Point([cx, cy]));
  centerH.set("type", "move");
  handles.push(centerH);

  // corner handle
  const corner = [cx + ux*halfL + vx*halfW, cy + uy*halfL + vy*halfW];
  const cornerH = new ol.Feature(new ol.geom.Point(corner));
  cornerH.set("type", "scale");
  handles.push(cornerH);

  // rotate handle
  const rot = [cx + ux*(halfL + 40), cy + uy*(halfL + 40)];
  const rotH = new ol.Feature(new ol.geom.Point(rot));
  rotH.set("type", "rotate");
  handles.push(rotH);

  handles.forEach(h => source.addFeature(h));
}

// --- styles ---
layer.setStyle(f => {
  const t = f.get("type");

  if (!t) {
    return new ol.style.Style({
      stroke: new ol.style.Stroke({ color: "red", width: 2 }),
      fill: new ol.style.Fill({ color: "rgba(255,0,0,0.1)" })
    });
  }

  return new ol.style.Style({
    image: new ol.style.Circle({
      radius: 15,
      fill: new ol.style.Fill({ color: t==="move"?"blue":t==="scale"?"green":"orange" })
    })
  });
});

// --- mode switch ---
document.getElementById("drawBtn").onclick = () => {

  if (mode === "VIEW") {
    mode = "DRAW";
    map.getInteractions().forEach(i => i.setActive(false));
  } else {
    mode = "VIEW";
    map.getInteractions().forEach(i => i.setActive(true));
  }

};


// --- events ---
map.on("pointerdown", e => {

  if (mode === "DRAW") {
    center = e.coordinate;
    angle = 0;
    halfL = 35;
    halfW = 20;

    updateRect();
    createHandles();

    mode = "EDIT";
    return;
  }

  if (mode !== "EDIT") return;

map.forEachFeatureAtPixel(e.pixel, f => {
  if (f.get("type")) activeHandle = f;
}, {
  hitTolerance: 25
});

map.on("pointermove_OLD", e => {

  if (!activeHandle) return;

  const dx = e.coordinate[0] - center[0];
  const dy = e.coordinate[1] - center[1];

  const type = activeHandle.get("type");

  if (type === "move") {
    center = e.coordinate;
  }

  if (type === "scale") {
    halfL = Math.sqrt(dx*dx + dy*dy);
    angle = Math.atan2(dy, dx);
  }

  if (type === "rotate") {
    angle = Math.atan2(dy, dx);
  }

  updateRect();
  createHandles();
});


map.on("pointermove", e => {
  if (!activeHandle) return;

  const dx = e.coordinate[0] - center[0];
  const dy = e.coordinate[1] - center[1];

  const type = activeHandle.get("type");

  if (type === "move") {
    center = e.coordinate;
  }

  else if (type === "scale") {
    const ux = Math.cos(angle);
    const uy = Math.sin(angle);

    const vx = -uy;
    const vy = ux;

    const localL = dx * ux + dy * uy;
    const localW = dx * vx + dy * vy;

    halfL = Math.max(5, Math.abs(localL));
    halfW = Math.max(5, Math.abs(localW));
  }

  else if (type === "rotate") {
    angle = Math.atan2(dy, dx);
  }

  updateRect();
  createHandles();
});





map.on("pointerup", () => {
  activeHandle = null;
});


</script>

</body>
</html>
