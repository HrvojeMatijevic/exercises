<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Rectangle Tester</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v7.5.2/ol.css">
  <script src="https://cdn.jsdelivr.net/npm/ol@v7.5.2/dist/ol.js"></script>
  <style>
    html, body { margin:0; padding:0; height:100%; }
    #map { width:100%; height:100%; }
    .hint {
      position:absolute;
      top:10px; left:10px;
      background:rgba(255,255,255,0.9);
      padding:8px;
      border-radius:6px;
      font-family:sans-serif;
      font-size:12px;
    }
  </style>
</head>
<body>

<div id="map"></div>
<div class="hint" id="hint">Tap to set center</div>

<script>
const hint = document.getElementById("hint");

// --- map ---
const raster = new ol.layer.Tile({
  source: new ol.source.OSM()
});

const source = new ol.source.Vector();
const layer = new ol.layer.Vector({ source });

const map = new ol.Map({
  target: 'map',
  layers: [raster, layer],
  view: new ol.View({
    center: ol.proj.fromLonLat([16, 45.8]),
    zoom: 15
  })
});

// --- state ---
let state = "IDLE";
let center = null;
let angle = 0;
let halfLength = 0;
let halfWidth = 0;
let feature = null;

// --- geometry builder ---
function buildRect() {
  const cx = center[0];
  const cy = center[1];

  const ux = Math.cos(angle);
  const uy = Math.sin(angle);

  const vx = -uy;
  const vy = ux;

  const L = halfLength;
  const W = halfWidth;

  const coords = [
    [cx + ux*L + vx*W, cy + uy*L + vy*W],
    [cx + ux*L - vx*W, cy + uy*L - vy*W],
    [cx - ux*L - vx*W, cy - uy*L - vy*W],
    [cx - ux*L + vx*W, cy - uy*L + vy*W],
    [cx + ux*L + vx*W, cy + uy*L + vy*W]
  ];

  return new ol.geom.Polygon([coords]);
}

// --- interaction ---
map.on("pointerdown", (e) => {

  if (state === "IDLE") {
    center = e.coordinate;
    state = "DRAW_LENGTH";
    hint.innerText = "Drag to set length & rotation";

    map.getInteractions().forEach(i => i.setActive(false));
  }

  else if (state === "WAIT_WIDTH") {
    state = "DRAW_WIDTH";
    hint.innerText = "Drag to adjust width";
  }
});

map.on("pointermove", (e) => {

  if (!center) return;

  const dx = e.coordinate[0] - center[0];
  const dy = e.coordinate[1] - center[1];

  if (state === "DRAW_LENGTH") {

    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < 1) return;

    angle = Math.atan2(dy, dx);
    halfLength = dist;
    halfWidth = 1; // temporary thin

    updateFeature();
  }

  else if (state === "DRAW_WIDTH") {

    const ux = Math.cos(angle);
    const uy = Math.sin(angle);

    // perpendicular projection
    const perp = Math.abs(dx * (-uy) + dy * ux);
    halfWidth = perp;

    updateFeature();
  }
});

map.on("pointerup", () => {

  if (state === "DRAW_LENGTH") {
    state = "WAIT_WIDTH";
    hint.innerText = "Tap & drag to set width";
  }

  else if (state === "DRAW_WIDTH") {
    state = "IDLE";
    hint.innerText = "Tap to start new rectangle";

    map.getInteractions().forEach(i => i.setActive(true));

    center = null;
    feature = null;
  }
});

// --- update feature ---
function updateFeature() {

  if (!feature) {
    feature = new ol.Feature();
    source.addFeature(feature);
  }

  feature.setGeometry(buildRect());
}

</script>
</body>
</html>
